<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant Meetup Asset Exporter</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2316F3BE'/%3E%3Crect x='7' y='13' width='18' height='6' rx='2' fill='%231D2126'/%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #1d2126;
      --muted: #5b6770;
      --accent: #16f3be;
      --accent-ink: #0c3b30;
      --border: #e3e7ea;
      --bg: #f5f7f8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 700; }
    header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 28px;
      padding: 28px;
      align-items: start;
    }
    @media (max-width: 840px) { .app { grid-template-columns: 1fr; } }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
    }
    .panel h2 {
      margin: 0 0 16px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .field { display: block; margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(22,243,190,.25); }
    .field input:disabled { background: #f1f3f4; color: #9aa4ab; cursor: not-allowed; }

    .toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .toggle input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }

    .actions { margin-top: 22px; display: flex; align-items: center; gap: 14px; }
    #download {
      appearance: none;
      border: 0;
      background: var(--accent);
      color: var(--accent-ink);
      font: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
    }
    #download:hover { filter: brightness(0.96); }
    #download:disabled { opacity: 0.6; cursor: default; }
    #status { font-size: 13px; color: var(--muted); }

    /* Preview column */
    .preview {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
    }
    .preview h2 {
      margin: 0 0 16px;
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
    }
    /* The scaler reserves space; the stage is rendered at native size and scaled down. */
    #scaler { position: relative; width: 100%; }
    #stage {
      position: relative;
      overflow: hidden;
      transform-origin: top left;
      background: #000;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
    }
    /* Layer primitives */
    .layer-image { position: absolute; display: block; }
    .layer-text  { position: absolute; white-space: pre-wrap; }
    .layer-row {
      position: absolute;
      display: inline-flex;
      flex-direction: row;
      width: max-content;     /* hug content → grows on one line */
      white-space: nowrap;
    }
    .layer-row .seg { display: inline-block; white-space: nowrap; }
    .layer-row .layer-image { position: static; }
  </style>
</head>
<body>
  <header>
    <h1>Home Assistant Meetup Social Template Exporter</h1>
    <p>Edit the text, then download a rendered PNG to announce your meetup.</p>
  </header>

  <main class="app">
    <section class="panel">
      <h2>Content</h2>
      <div id="controls"></div>
      <div class="actions">
        <button id="download">Download PNG</button>
        <span id="status"></span>
      </div>
    </section>

    <section class="preview">
      <h2>Preview</h2>
      <div id="scaler">
        <div id="stage"></div>
      </div>
    </section>
  </main>

  <!-- Order matters: assets → vendor lib → templates → app. All local, no fetch. -->
  <script src="js/assets.js"></script>
  <script src="js/vendor/html-to-image.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
